<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="רבקה | תורים">
  <meta name="theme-color" content="#A88070">
  <link rel="manifest" href="manifest.json">
  <title>רבקה אסידון | ניהול תורים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:       #C9A898;
      --primary-light: #EDD8CE;
      --primary-dark:  #A88070;
      --bg:            #FAF7F4;
      --gold:          #C9A96E;
      --gold-light:    #F5EDD4;
      --text-dark:     #3D3532;
      --text-mid:      #7A6A5A;
      --text-light:    #B8A898;
      --white:         #FFFFFF;
      --border:        #EDE0D4;
      --success:       #6BAA87;
      --success-bg:    #E6F4EC;
      --warning:       #D4900A;
      --warning-bg:    #FDF3DC;
      --danger:        #C05050;
      --danger-bg:     #FDEAEA;
      --shadow:        0 2px 16px rgba(61,53,50,0.07);
      --shadow-lg:     0 6px 28px rgba(61,53,50,0.12);
      --r:             14px;
      --r-sm:          10px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      font-family:'Heebo',sans-serif;
      background:var(--bg);
      color:var(--text-dark);
      min-height:100vh;
      max-width:430px;
      margin:0 auto;
      overscroll-behavior:none;
    }

    /* ── VIEWS ── */
    .view{display:none;min-height:100vh;padding-bottom:86px;animation:fadeIn .18s ease}
    .view.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* ── HEADER ── */
    .hdr{
      background:var(--white);
      padding:18px 18px 14px;
      border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:100;
    }
    .hdr-row{display:flex;justify-content:space-between;align-items:center}
    .hdr-title{font-size:19px;font-weight:700;color:var(--text-dark)}
    .hdr-sub{font-size:12px;color:var(--text-light);margin-top:2px}

    /* ── BOTTOM NAV ── */
    .bnav{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:430px;
      background:var(--white);
      border-top:1px solid var(--border);
      display:flex;
      padding:6px 0 calc(6px + env(safe-area-inset-bottom));
      z-index:200;
      box-shadow:0 -2px 16px rgba(61,53,50,0.06);
    }
    .ni{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:8px 4px;cursor:pointer;border:none;background:none;
      color:var(--text-light);font-family:'Heebo',sans-serif;font-size:11px;
      transition:color .2s;
    }
    .ni.active{color:var(--primary-dark)}
    .ni svg{width:22px;height:22px;stroke-width:1.8}
    .ni-add{
      background:var(--primary-dark);color:white;
      border-radius:50%;width:50px;height:50px;
      display:flex;align-items:center;justify-content:center;
      margin-top:-18px;
      box-shadow:0 4px 18px rgba(168,128,112,.45);
    }

    /* ── CARDS ── */
    .card{
      background:var(--white);border-radius:var(--r);
      padding:18px;box-shadow:var(--shadow);margin:10px 14px;
    }
    .card-title{font-size:14px;font-weight:600;color:var(--text-dark);margin-bottom:12px}

    /* ── STATS ROW ── */
    .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 14px}
    .stat-card{
      background:var(--white);border-radius:var(--r-sm);
      padding:16px 14px;box-shadow:var(--shadow);text-align:center;
    }
    .stat-val{font-size:21px;font-weight:800;color:var(--primary-dark)}
    .stat-lbl{font-size:11px;color:var(--text-light);margin-top:3px}

    /* ── APPOINTMENT CARD ── */
    .ac{
      background:var(--white);border-radius:var(--r-sm);
      padding:14px 14px 14px 16px;
      margin:7px 14px;
      box-shadow:var(--shadow);
      display:flex;gap:12px;align-items:center;
      cursor:pointer;
      border-right:4px solid var(--primary);
      transition:transform .12s, box-shadow .12s;
    }
    .ac:active{transform:scale(.98);box-shadow:none}
    .ac.completed{border-right-color:var(--success);opacity:.78}
    .ac.cancelled{border-right-color:var(--text-light);opacity:.55}
    .ac-date{
      background:var(--bg);border-radius:9px;
      padding:9px 10px;text-align:center;min-width:46px;flex-shrink:0;
    }
    .ac-day{font-size:20px;font-weight:800;color:var(--primary-dark);line-height:1}
    .ac-mon{font-size:10px;color:var(--text-light);margin-top:2px}
    .ac-info{flex:1;min-width:0}
    .ac-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ac-det{font-size:12px;color:var(--text-mid);margin-top:3px}
    .ac-price{font-size:15px;font-weight:700;color:var(--gold);flex-shrink:0}

    /* ── BADGES ── */
    .badge{
      display:inline-block;padding:2px 8px;border-radius:12px;
      font-size:10px;font-weight:600;vertical-align:middle;margin-right:4px;
    }
    .badge-today{background:var(--warning-bg);color:var(--warning)}
    .badge-past{background:var(--danger-bg);color:var(--danger)}
    .badge-done{background:var(--success-bg);color:var(--success)}

    /* ── SECTION TITLE ── */
    .sec-title{
      font-size:11px;font-weight:700;color:var(--text-light);
      text-transform:uppercase;letter-spacing:.6px;
      padding:14px 18px 5px;
    }

    /* ── FORM ── */
    .form-wrap{padding:18px 14px}
    .fg{margin-bottom:16px}
    .fl{display:block;font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:7px}
    .fi{
      width:100%;padding:13px 14px;
      background:var(--white);border:1.5px solid var(--border);
      border-radius:var(--r-sm);
      font-family:'Heebo',sans-serif;font-size:15px;color:var(--text-dark);
      transition:border-color .2s;outline:none;
    }
    .fi:focus{border-color:var(--primary)}
    .fi::placeholder{color:var(--text-light)}
    textarea.fi{resize:vertical;min-height:80px}

    /* ── SERVICE SELECTOR ── */
    .svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .svc-btn{
      padding:14px 8px;border:2px solid var(--border);
      border-radius:var(--r-sm);background:var(--white);
      cursor:pointer;text-align:center;transition:all .18s;
      font-family:'Heebo',sans-serif;
    }
    .svc-btn:active{transform:scale(.97)}
    .svc-btn.sel{border-color:var(--primary-dark);background:var(--primary-light)}
    .svc-ico{font-size:22px;display:block;margin-bottom:5px}
    .svc-name{font-size:13px;font-weight:600;color:var(--text-dark)}
    .svc-price{font-size:11px;color:var(--text-light);margin-top:2px}

    /* ── CONTACT PICKER BUTTON ── */
    .btn-contact-pick{
      width:100%;padding:13px 16px;
      background:var(--gold-light);border:1.5px solid var(--gold);
      border-radius:var(--r-sm);
      font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;
      color:var(--text-dark);cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:background .15s;
    }
    .btn-contact-pick:active{background:var(--gold);color:white}
    .btn-phone-ico{
      flex-shrink:0;width:46px;height:46px;
      border:1.5px solid var(--border);border-radius:var(--r-sm);
      background:var(--white);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;transition:background .15s;
    }
    .btn-phone-ico:active{background:var(--primary-light)}

    /* ── BUTTONS ── */
    .btn{
      width:100%;padding:15px;
      border:none;border-radius:var(--r-sm);
      font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;
      cursor:pointer;transition:opacity .15s, transform .1s;
    }
    .btn:active{opacity:.88;transform:scale(.99)}
    .btn-primary{background:var(--primary-dark);color:white}
    .btn-secondary{background:transparent;color:var(--text-mid);border:1.5px solid var(--border)!important;border:none}
    .btn-wa{background:#25D366;color:white;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-ghost{background:none;border:none;color:var(--danger);font-family:'Heebo',sans-serif;font-size:14px;padding:8px;cursor:pointer;width:100%;text-align:center}

    /* ── DETAIL VIEW ── */
    .dh{
      background:linear-gradient(145deg,var(--primary-dark) 0%,var(--primary) 60%,#D4B09A 100%);
      padding:20px 18px 24px;
    }
    .back-btn{
      display:inline-flex;align-items:center;gap:5px;
      background:rgba(255,255,255,.2);border:none;
      border-radius:20px;padding:6px 12px 6px 8px;
      color:white;font-family:'Heebo',sans-serif;font-size:13px;
      cursor:pointer;margin-bottom:14px;
    }
    .d-name{font-size:24px;font-weight:800;color:white}
    .d-svc{font-size:14px;color:rgba(255,255,255,.85);margin-top:5px}
    .d-row{
      display:flex;align-items:center;gap:12px;
      padding:13px 0;border-bottom:1px solid var(--border);
    }
    .d-row:last-child{border:none}
    .d-ico{
      width:34px;height:34px;background:var(--bg);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:15px;flex-shrink:0;
    }
    .d-txt-lbl{font-size:10px;color:var(--text-light)}
    .d-txt-val{font-size:15px;font-weight:500;margin-top:1px}

    /* ── INCOME VIEW ── */
    .inc-hdr{
      background:linear-gradient(135deg,var(--primary-dark),var(--gold));
      padding:28px 20px 24px;
    }
    .inc-total{font-size:42px;font-weight:800;color:white;letter-spacing:-1px}
    .inc-lbl{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:6px}
    .inc-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:5px}
    .mon-sel{
      display:flex;align-items:center;justify-content:center;gap:16px;
      padding:14px;background:var(--white);border-bottom:1px solid var(--border);
    }
    .mon-btn{
      background:var(--bg);border:none;font-size:22px;cursor:pointer;
      color:var(--primary-dark);padding:6px 14px;border-radius:8px;
    }
    .mon-lbl{font-size:15px;font-weight:700;color:var(--text-dark);min-width:130px;text-align:center}
    .bar-row{display:flex;align-items:center;gap:10px;padding:5px 0}
    .bar-lbl{font-size:12px;color:var(--text-mid);min-width:85px}
    .bar-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:4px;transition:width .5s ease}
    .bar-val{font-size:12px;font-weight:700;color:var(--text-dark);min-width:52px;text-align:left}

    /* ── MONTH TOTAL ROW ── */
    .mo-comparison{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
      padding:14px 14px 0;
    }
    .mo-item{
      background:var(--white);border-radius:var(--r-sm);
      padding:12px;box-shadow:var(--shadow);text-align:center;
    }
    .mo-item-val{font-size:17px;font-weight:700}
    .mo-item-lbl{font-size:11px;color:var(--text-light);margin-top:2px}

    /* ── MODAL SHEET ── */
    .overlay{
      display:none;position:fixed;inset:0;
      background:rgba(40,30,28,.5);z-index:300;
      align-items:flex-end;backdrop-filter:blur(2px);
    }
    .overlay.show{display:flex}
    .sheet{
      background:var(--white);width:100%;max-width:430px;
      margin:0 auto;border-radius:20px 20px 0 0;
      padding:22px 18px calc(30px + env(safe-area-inset-bottom));
    }
    .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}

    /* ── TOAST ── */
    .toast{
      position:fixed;top:18px;left:50%;
      transform:translateX(-50%) translateY(-80px);
      background:var(--text-dark);color:white;
      padding:11px 22px;border-radius:28px;font-size:13px;
      z-index:500;transition:transform .28s ease;white-space:nowrap;
      box-shadow:0 4px 18px rgba(0,0,0,.18);
    }
    .toast.show{transform:translateX(-50%) translateY(0)}

    /* ── PILL TABS ── */
    .pills{
      display:flex;gap:7px;padding:10px 14px;
      overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
    }
    .pills::-webkit-scrollbar{display:none}
    .pill{
      flex-shrink:0;padding:7px 16px;border-radius:18px;
      border:1.5px solid var(--border);background:var(--white);
      font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
      color:var(--text-mid);cursor:pointer;transition:all .18s;
    }
    .pill.active{background:var(--primary-dark);border-color:var(--primary-dark);color:white}

    /* ── EMPTY STATE ── */
    .empty{padding:48px 20px;text-align:center;color:var(--text-light)}
    .empty-ico{font-size:44px;margin-bottom:12px}
    .empty-txt{font-size:14px;line-height:1.7}

    /* ── GRID HELPERS ── */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* ── PENDING ALERT ── */
    .alert{
      background:var(--warning-bg);border:1px solid #F0D080;
      border-radius:var(--r-sm);padding:12px 14px;margin:8px 14px;
      display:flex;align-items:center;gap:10px;cursor:pointer;
    }
    .alert-ico{font-size:18px;flex-shrink:0}
    .alert-txt{font-size:13px;color:var(--warning)}

    /* ── COMPLETED AMOUNT BADGE ── */
    .received-badge{
      background:var(--success-bg);color:var(--success);
      font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;
      display:inline-block;margin-top:4px;
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════
     VIEW: HOME
═══════════════════════════════════════════════ -->
<div class="view active" id="view-home">
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-title">שלום רבקה 💄</div>
        <div class="hdr-sub" id="home-date"></div>
      </div>
      <div style="font-size:26px">✨</div>
    </div>
  </div>

  <!-- Pending alert -->
  <div id="pending-alert"></div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="s-income">₪0</div>
      <div class="stat-lbl">הכנסה החודש</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-count">0</div>
      <div class="stat-lbl">תורים החודש</div>
    </div>
  </div>

  <div class="sec-title">היום</div>
  <div id="today-list"></div>

  <div class="sec-title">הקרובים — 14 יום</div>
  <div id="upcoming-list"></div>
</div>

<!-- ═══════════════════════════════════════════════
     VIEW: APPOINTMENTS
═══════════════════════════════════════════════ -->
<div class="view" id="view-appointments">
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-title">כל התורים</div>
      <div id="appt-count-badge" style="font-size:13px;color:var(--text-light)"></div>
    </div>
  </div>
  <div class="pills">
    <button class="pill active" onclick="setFilter('all',this)">הכל</button>
    <button class="pill" onclick="setFilter('upcoming',this)">עתידיים</button>
    <button class="pill" onclick="setFilter('completed',this)">הושלמו</button>
    <button class="pill" onclick="setFilter('cancelled',this)">בוטלו</button>
  </div>
  <div id="all-list"></div>
</div>

<!-- ═══════════════════════════════════════════════
     VIEW: ADD / EDIT
═══════════════════════════════════════════════ -->
<div class="view" id="view-add">
  <div class="hdr">
    <div class="hdr-row">
      <button class="back-btn" style="background:none;color:var(--text-mid);padding:0;border-radius:0" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        חזור
      </button>
      <div class="hdr-title" id="form-ttl">תור חדש</div>
    </div>
  </div>

  <div class="form-wrap">
    <input type="hidden" id="edit-id">

    <!-- Contact picker button — always visible -->
    <div style="margin-bottom:16px">
      <button type="button" class="btn-contact-pick" onclick="pickContact()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        בחר מאנשי קשר
      </button>
    </div>

    <div class="fg">
      <label class="fl">שם הלקוחה *</label>
      <input type="text" class="fi" id="i-name" placeholder="שם פרטי ושם משפחה">
    </div>

    <div class="fg">
      <label class="fl">מספר פלאפון</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="tel" class="fi" id="i-phone" placeholder="05X-XXXXXXX" dir="ltr" inputmode="tel" style="flex:1">
        <button type="button" onclick="pickContact()" title="בחר מאנשי קשר" class="btn-phone-ico">
          👤
        </button>
      </div>
    </div>

    <div class="fg">
      <label class="fl">סוג שירות *</label>
      <div class="svc-grid">
        <button class="svc-btn" id="sv-evening" onclick="pickSvc('evening',this)">
          <span class="svc-ico">🌙</span>
          <div class="svc-name">איפור ערב</div>
          <div class="svc-price">₪350</div>
        </button>
        <button class="svc-btn" id="sv-henna" onclick="pickSvc('henna',this)">
          <span class="svc-ico">✨</span>
          <div class="svc-name">איפור חינה</div>
          <div class="svc-price">₪350</div>
        </button>
        <button class="svc-btn" id="sv-bride" onclick="pickSvc('bride',this)">
          <span class="svc-ico">💍</span>
          <div class="svc-name">כלה</div>
          <div class="svc-price">₪1,500</div>
        </button>
        <button class="svc-btn" id="sv-other" onclick="pickSvc('other',this)">
          <span class="svc-ico">💄</span>
          <div class="svc-name">אחר</div>
          <div class="svc-price">חופשי</div>
        </button>
      </div>
    </div>

    <div class="grid2">
      <div class="fg">
        <label class="fl">תאריך *</label>
        <input type="date" class="fi" id="i-date">
      </div>
      <div class="fg">
        <label class="fl">שעה</label>
        <input type="time" class="fi" id="i-time">
      </div>
    </div>

    <div class="fg">
      <label class="fl">מחיר שסוכם (₪)</label>
      <input type="number" class="fi" id="i-price" placeholder="0" inputmode="numeric">
    </div>

    <div class="fg">
      <label class="fl">מיקום / כתובת</label>
      <input type="text" class="fi" id="i-loc" placeholder="עיר או כתובת">
    </div>

    <div class="fg">
      <label class="fl">הערות</label>
      <textarea class="fi" id="i-notes" placeholder="הוסיפי הערות אם צריך..."></textarea>
    </div>

    <button class="btn btn-primary" onclick="saveAppt()">שמור תור ✓</button>
    <div style="height:10px"></div>
    <button class="btn btn-secondary" onclick="goBack()">ביטול</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     VIEW: DETAIL
═══════════════════════════════════════════════ -->
<div class="view" id="view-detail">
  <div class="dh" id="dh"></div>
  <div class="card" id="d-rows"></div>
  <div style="padding:0 14px 12px;display:flex;flex-direction:column;gap:9px" id="d-actions"></div>
</div>

<!-- ═══════════════════════════════════════════════
     VIEW: INCOME
═══════════════════════════════════════════════ -->
<div class="view" id="view-income">
  <div class="mon-sel">
    <button class="mon-btn" onclick="shiftMonth(-1)">‹</button>
    <div class="mon-lbl" id="inc-month"></div>
    <button class="mon-btn" onclick="shiftMonth(1)">›</button>
  </div>
  <div class="inc-hdr">
    <div class="inc-lbl" id="inc-lbl"></div>
    <div class="inc-total" id="inc-total">₪0</div>
    <div class="inc-sub" id="inc-sub"></div>
  </div>

  <div style="padding:10px 14px 0">
    <div class="grid2">
      <div class="mo-item">
        <div class="mo-item-val" style="color:var(--primary-dark)" id="inc-confirmed">₪0</div>
        <div class="mo-item-lbl">סוכם</div>
      </div>
      <div class="mo-item">
        <div class="mo-item-val" style="color:var(--success)" id="inc-received">₪0</div>
        <div class="mo-item-lbl">התקבל בפועל</div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="card-title">לפי סוג שירות</div>
    <div id="inc-breakdown"></div>
  </div>

  <div class="sec-title">תורים שהושלמו</div>
  <div id="inc-list"></div>
</div>

<!-- ═══════════════════════════════════════════════
     MODAL: COMPLETE APPOINTMENT
═══════════════════════════════════════════════ -->
<div class="overlay" id="modal-complete">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="font-size:18px;font-weight:700;margin-bottom:6px">סיום תור</div>
    <div style="font-size:14px;color:var(--text-mid);margin-bottom:18px">
      כמה קיבלת מ<strong id="m-name"></strong>?
    </div>
    <div class="fg">
      <label class="fl">סכום שהתקבל (₪) *</label>
      <input type="number" class="fi" id="m-amount" inputmode="numeric" placeholder="הכניסי סכום">
    </div>
    <button class="btn btn-primary" onclick="confirmDone()">אישור ✓</button>
    <div style="height:8px"></div>
    <button class="btn btn-secondary" onclick="closeModal('modal-complete')">ביטול</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     MODAL: CANCEL CONFIRM
═══════════════════════════════════════════════ -->
<div class="overlay" id="modal-cancel">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px">ביטול תור</div>
    <div style="font-size:14px;color:var(--text-mid);margin-bottom:20px">
      לבטל את התור של <strong id="cancel-name"></strong>? לא ניתן לשחזר.
    </div>
    <button class="btn" style="background:var(--danger);color:white" onclick="doCancel()">כן, בטל תור</button>
    <div style="height:8px"></div>
    <button class="btn btn-secondary" onclick="closeModal('modal-cancel')">השאר תור</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     BOTTOM NAV
═══════════════════════════════════════════════ -->
<nav class="bnav">
  <button class="ni active" id="ni-home" onclick="go('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    ראשי
  </button>
  <button class="ni" id="ni-appointments" onclick="go('appointments')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    תורים
  </button>
  <button class="ni" id="ni-add" onclick="go('add')">
    <div class="ni-add">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="22" height="22"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    הוסף
  </button>
  <button class="ni" id="ni-income" onclick="go('income')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    הכנסות
  </button>
</nav>

<script>
/* ══════════════════════════════════════════════════
   CONSTANTS & DATA
══════════════════════════════════════════════════ */
const DB = 'rivka_v1';
const SVCS = {
  evening: { label: 'איפור ערב / מלווה', short: 'ערב', price: 350,  ico: '🌙' },
  henna:   { label: 'איפור חינה',         short: 'חינה', price: 350,  ico: '✨' },
  bride:   { label: 'איפור כלה',          short: 'כלה',  price: 1500, ico: '💍' },
  other:   { label: 'שירות אחר',          short: 'אחר',  price: 0,    ico: '💄' }
};
const HM = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HD = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function db()    { try { return JSON.parse(localStorage.getItem(DB)) || []; } catch { return []; } }
function save(d) { localStorage.setItem(DB, JSON.stringify(d)); }
function uid()   { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDate(s) { return new Date(s + 'T00:00:00'); }

/* ══════════════════════════════════════════════════
   ROUTING
══════════════════════════════════════════════════ */
let curView   = 'home';
let prevView  = 'home';
let filterMode = 'all';
let incMonth  = new Date();
let doneId    = null;
let cancelId  = null;
let selSvc    = null;

function go(view, params = {}) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  const ni = document.getElementById('ni-' + view);
  if (ni) ni.classList.add('active');

  prevView = curView;
  curView  = view;
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('view-' + view).scrollTop = 0;

  switch(view) {
    case 'home':         renderHome(); break;
    case 'appointments': renderAll(); break;
    case 'add':          renderForm(params.editId); break;
    case 'detail':       renderDetail(params.id); break;
    case 'income':       renderIncome(); break;
  }
}

function goBack() { go(prevView); }

/* ══════════════════════════════════════════════════
   HOME
══════════════════════════════════════════════════ */
function renderHome() {
  const today = new Date();
  const todayStr = fmtDate(today);
  document.getElementById('home-date').textContent =
    `יום ${HD[today.getDay()]}, ${today.getDate()} ב${HM[today.getMonth()]} ${today.getFullYear()}`;

  const all = db();
  const m = today.getMonth(), y = today.getFullYear();

  const monthAll = all.filter(a => {
    const d = parseDate(a.date);
    return d.getMonth() === m && d.getFullYear() === y && a.status !== 'cancelled';
  });
  const monthIncome = monthAll
    .filter(a => a.status === 'completed')
    .reduce((s, a) => s + (+a.receivedAmount || 0), 0);

  document.getElementById('s-income').textContent = `₪${monthIncome.toLocaleString()}`;
  document.getElementById('s-count').textContent  = monthAll.length;

  // Pending payment alert (past upcoming)
  const pending = all.filter(a => a.date < todayStr && a.status === 'upcoming');
  const pa = document.getElementById('pending-alert');
  if (pending.length) {
    pa.innerHTML = `
      <div class="alert" onclick="go('appointments')">
        <div class="alert-ico">⚠️</div>
        <div class="alert-txt">יש ${pending.length} תור${pending.length > 1 ? 'ים' : ''} שעברו ועדיין לא סומנו כהושלמו</div>
      </div>`;
  } else { pa.innerHTML = ''; }

  // Today
  const todayList = all.filter(a => a.date === todayStr && a.status !== 'cancelled');
  document.getElementById('today-list').innerHTML = todayList.length
    ? todayList.map(a => apptCard(a, true)).join('')
    : '<div style="color:var(--text-light);font-size:13px;padding:6px 18px 10px">אין תורים היום</div>';

  // Upcoming 14 days
  const up = all.filter(a => {
    if (a.status === 'cancelled' || a.status === 'completed') return false;
    const diff = (parseDate(a.date) - parseDate(todayStr)) / 864e5;
    return diff > 0 && diff <= 14;
  }).sort((a,b) => a.date.localeCompare(b.date));

  document.getElementById('upcoming-list').innerHTML = up.length
    ? up.map(a => apptCard(a)).join('')
    : '<div style="color:var(--text-light);font-size:13px;padding:6px 18px 20px">אין תורים ב-14 הימים הקרובים</div>';
}

/* ══════════════════════════════════════════════════
   APPOINTMENT CARD
══════════════════════════════════════════════════ */
function apptCard(a, isToday = false) {
  const d    = parseDate(a.date);
  const svc  = SVCS[a.serviceType] || { label: a.serviceType, ico: '💄', short: '' };
  const cls  = a.status === 'completed' ? 'completed' : a.status === 'cancelled' ? 'cancelled' : '';
  const today = fmtDate(new Date());
  let badge = '';
  if (isToday) badge = '<span class="badge badge-today">היום</span>';
  else if (a.date < today && a.status === 'upcoming') badge = '<span class="badge badge-past">עבר</span>';
  else if (a.status === 'completed') badge = '<span class="badge badge-done">הושלם</span>';

  const shownPrice = a.status === 'completed' && a.receivedAmount
    ? a.receivedAmount : (a.agreedPrice || 0);

  return `
    <div class="ac ${cls}" onclick="go('detail',{id:'${a.id}'})">
      <div class="ac-date">
        <div class="ac-day">${d.getDate()}</div>
        <div class="ac-mon">${HM[d.getMonth()].slice(0,3)}</div>
      </div>
      <div class="ac-info">
        <div class="ac-name">${a.clientName} ${badge}</div>
        <div class="ac-det">${svc.ico} ${svc.label}${a.time ? ' · ' + a.time : ''}</div>
        ${a.location ? `<div class="ac-det">📍 ${a.location}</div>` : ''}
      </div>
      <div class="ac-price">₪${(+shownPrice).toLocaleString()}</div>
    </div>`;
}

/* ══════════════════════════════════════════════════
   ALL APPOINTMENTS
══════════════════════════════════════════════════ */
function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function renderAll() {
  let list = db();
  if (filterMode !== 'all') list = list.filter(a => a.status === filterMode);
  list.sort((a, b) =>
    filterMode === 'completed'
      ? b.date.localeCompare(a.date)
      : a.date.localeCompare(b.date)
  );

  document.getElementById('appt-count-badge').textContent = list.length ? `${list.length} תורים` : '';

  if (!list.length) {
    document.getElementById('all-list').innerHTML = `
      <div class="empty">
        <div class="empty-ico">📅</div>
        <div class="empty-txt">אין תורים כאן עדיין.<br>לחצי + להוספת תור חדש.</div>
      </div>`;
    return;
  }

  // Group by month
  const groups = {};
  list.forEach(a => {
    const d   = parseDate(a.date);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (!groups[key]) groups[key] = { lbl: `${HM[d.getMonth()]} ${d.getFullYear()}`, items: [] };
    groups[key].items.push(a);
  });

  document.getElementById('all-list').innerHTML =
    Object.values(groups).map(g =>
      `<div class="sec-title">${g.lbl}</div>` + g.items.map(a => apptCard(a)).join('')
    ).join('');
}

/* ══════════════════════════════════════════════════
   ADD / EDIT FORM
══════════════════════════════════════════════════ */
function renderForm(editId = null) {
  selSvc = null;
  ['i-name','i-phone','i-time','i-loc','i-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('i-price').value = '';
  document.getElementById('edit-id').value = editId || '';
  document.querySelectorAll('.svc-btn').forEach(b => b.classList.remove('sel'));

  if (editId) {
    document.getElementById('form-ttl').textContent = 'עריכת תור';
    const a = db().find(x => x.id === editId);
    if (a) {
      document.getElementById('i-name').value  = a.clientName || '';
      document.getElementById('i-phone').value = a.phone      || '';
      document.getElementById('i-date').value  = a.date       || '';
      document.getElementById('i-time').value  = a.time       || '';
      document.getElementById('i-price').value = a.agreedPrice || '';
      document.getElementById('i-loc').value   = a.location   || '';
      document.getElementById('i-notes').value = a.notes      || '';
      if (a.serviceType) { selSvc = a.serviceType; document.getElementById('sv-' + a.serviceType)?.classList.add('sel'); }
    }
  } else {
    document.getElementById('form-ttl').textContent = 'תור חדש';
    document.getElementById('i-date').value = fmtDate(new Date());
  }
}

function pickSvc(type, btn) {
  selSvc = type;
  document.querySelectorAll('.svc-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  const pi = document.getElementById('i-price');
  if (!pi.value || pi.value === '0') pi.value = SVCS[type].price || '';
}

function saveAppt() {
  const name  = document.getElementById('i-name').value.trim();
  const date  = document.getElementById('i-date').value;
  const phone = document.getElementById('i-phone').value.trim();
  const time  = document.getElementById('i-time').value;
  const price = document.getElementById('i-price').value;
  const loc   = document.getElementById('i-loc').value.trim();
  const notes = document.getElementById('i-notes').value.trim();
  const eid   = document.getElementById('edit-id').value;

  if (!name)   { toast('יש להזין שם לקוחה'); return; }
  if (!date)   { toast('יש לבחור תאריך');    return; }
  if (!selSvc) { toast('יש לבחור סוג שירות'); return; }

  const all = db();
  if (eid) {
    const i = all.findIndex(a => a.id === eid);
    if (i !== -1) Object.assign(all[i], { clientName: name, phone, date, time, serviceType: selSvc, agreedPrice: +price||0, location: loc, notes });
    toast('התור עודכן ✓');
  } else {
    all.push({ id: uid(), clientName: name, phone, date, time, serviceType: selSvc, agreedPrice: +price||0, location: loc, notes, status: 'upcoming', receivedAmount: null, createdAt: Date.now() });
    toast('התור נוסף ✓');
  }
  save(all);
  go('appointments');
}

/* ══════════════════════════════════════════════════
   DETAIL VIEW
══════════════════════════════════════════════════ */
function renderDetail(id) {
  const a   = db().find(x => x.id === id);
  if (!a)   { goBack(); return; }
  const svc = SVCS[a.serviceType] || { label: a.serviceType || '—', ico: '💄' };
  const d   = parseDate(a.date);
  const statusMap = { upcoming: 'מתוכנן', completed: 'הושלם', cancelled: 'בוטל' };

  // Hero
  const statusDot = a.status === 'completed' ? '🟢' : a.status === 'cancelled' ? '🔴' : '🟡';
  document.getElementById('dh').innerHTML = `
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      חזור
    </button>
    <div class="d-name">${a.clientName}</div>
    <div class="d-svc">${svc.ico} ${svc.label} · ${statusDot} ${statusMap[a.status]}</div>`;

  // Rows
  const rows = [
    { ico: '📅', lbl: 'תאריך', val: `יום ${HD[d.getDay()]}, ${d.getDate()} ב${HM[d.getMonth()]} ${d.getFullYear()}` },
    { ico: '🕐', lbl: 'שעה',   val: a.time || '—' },
    { ico: '📍', lbl: 'מיקום', val: a.location || '—' },
    { ico: '💰', lbl: 'מחיר שסוכם', val: `₪${(a.agreedPrice||0).toLocaleString()}` },
    a.receivedAmount != null
      ? { ico: '✅', lbl: 'התקבל בפועל', val: `₪${(+a.receivedAmount).toLocaleString()}` }
      : null,
    { ico: '📞', lbl: 'פלאפון', val: a.phone || '—' },
    a.notes ? { ico: '📝', lbl: 'הערות', val: a.notes } : null,
  ].filter(Boolean);

  document.getElementById('d-rows').innerHTML =
    rows.map(r => `
      <div class="d-row">
        <div class="d-ico">${r.ico}</div>
        <div>
          <div class="d-txt-lbl">${r.lbl}</div>
          <div class="d-txt-val">${r.val}</div>
        </div>
      </div>`).join('');

  // Actions
  const acts = [];

  if (a.phone) {
    const ph  = a.phone.replace(/\D/g, '');
    const iph = ph.startsWith('0') ? '972' + ph.slice(1) : ph;
    const dateHeb = `${d.getDate()} ב${HM[d.getMonth()]}`;
    const timePart = a.time ? ` בשעה ${a.time}` : '';
    const locPart  = a.location ? `\n📍 ${a.location}` : '';
    const msg = encodeURIComponent(`היי ${a.clientName} ❤️\n\nרציתי להזכיר לך שיש לנו פגישת ${svc.label} ב-${dateHeb}${timePart}.${locPart}\n\nמחכה לך! 💄\nרבקה`);
    acts.push(`<button class="btn btn-wa" onclick="window.open('https://wa.me/${iph}?text=${msg}','_blank')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884"/></svg>
      שלח תזכורת בוואטסאפ
    </button>`);
  }

  if (a.status === 'upcoming') {
    acts.push(`<button class="btn btn-primary" onclick="openDoneModal('${a.id}')">✓ סיימתי — רשמי סכום</button>`);
    acts.push(`<button class="btn btn-secondary" onclick="go('add',{editId:'${a.id}'})">✏️ עריכה</button>`);
    acts.push(`<button class="btn-ghost" onclick="openCancelModal('${a.id}')">ביטול תור</button>`);
  } else if (a.status === 'completed') {
    acts.push(`<button class="btn btn-secondary" onclick="go('add',{editId:'${a.id}'})">✏️ עריכה</button>`);
    acts.push(`<button class="btn btn-secondary" style="color:var(--primary-dark);border-color:var(--primary-light)!important" onclick="openDoneModal('${a.id}')">✏️ עדכן סכום</button>`);
  }

  document.getElementById('d-actions').innerHTML = acts.join('');
}

/* ══════════════════════════════════════════════════
   MODALS
══════════════════════════════════════════════════ */
function openDoneModal(id) {
  doneId = id;
  const a = db().find(x => x.id === id);
  if (!a) return;
  document.getElementById('m-name').textContent = a.clientName;
  document.getElementById('m-amount').value = a.receivedAmount || a.agreedPrice || '';
  openModal('modal-complete');
  setTimeout(() => document.getElementById('m-amount').focus(), 300);
}

function confirmDone() {
  const amt = parseFloat(document.getElementById('m-amount').value);
  if (!amt || amt <= 0) { toast('יש להזין סכום חיובי'); return; }
  const all = db();
  const i = all.findIndex(a => a.id === doneId);
  if (i !== -1) { all[i].status = 'completed'; all[i].receivedAmount = amt; }
  save(all);
  closeModal('modal-complete');
  toast(`₪${amt.toLocaleString()} נרשמו ✓`);
  renderDetail(doneId);
}

function openCancelModal(id) {
  cancelId = id;
  const a = db().find(x => x.id === id);
  document.getElementById('cancel-name').textContent = a?.clientName || '';
  openModal('modal-cancel');
}

function doCancel() {
  const all = db();
  const i = all.findIndex(a => a.id === cancelId);
  if (i !== -1) all[i].status = 'cancelled';
  save(all);
  closeModal('modal-cancel');
  toast('התור בוטל');
  go('appointments');
}

function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); })
);

/* ══════════════════════════════════════════════════
   INCOME VIEW
══════════════════════════════════════════════════ */
function renderIncome() {
  const m = incMonth.getMonth(), y = incMonth.getFullYear();
  const lbl = `${HM[m]} ${y}`;
  document.getElementById('inc-month').textContent = lbl;
  document.getElementById('inc-lbl').textContent   = lbl;

  const all = db().filter(a => {
    const d = parseDate(a.date);
    return d.getMonth() === m && d.getFullYear() === y;
  });

  const done     = all.filter(a => a.status === 'completed');
  const received = done.reduce((s, a) => s + (+a.receivedAmount || 0), 0);
  const confirmed= all.filter(a => a.status !== 'cancelled').reduce((s, a) => s + (+a.agreedPrice || 0), 0);

  document.getElementById('inc-total').textContent    = `₪${received.toLocaleString()}`;
  document.getElementById('inc-sub').textContent      = `${done.length} תורים שהושלמו`;
  document.getElementById('inc-received').textContent = `₪${received.toLocaleString()}`;
  document.getElementById('inc-confirmed').textContent= `₪${confirmed.toLocaleString()}`;

  // Breakdown
  const bk = {};
  done.forEach(a => {
    bk[a.serviceType] = (bk[a.serviceType] || 0) + (+a.receivedAmount || 0);
  });
  const maxV = Math.max(...Object.values(bk), 1);
  document.getElementById('inc-breakdown').innerHTML = Object.keys(bk).length
    ? Object.entries(bk).map(([t, v]) => {
        const s = SVCS[t] || { short: t, ico: '💄' };
        return `<div class="bar-row">
          <div class="bar-lbl">${s.ico} ${s.short}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(v/maxV*100).toFixed(1)}%"></div></div>
          <div class="bar-val">₪${v.toLocaleString()}</div>
        </div>`;
      }).join('')
    : '<div style="color:var(--text-light);font-size:13px">אין נתונים לחודש זה</div>';

  // List
  document.getElementById('inc-list').innerHTML = done.length
    ? done.sort((a,b) => b.date.localeCompare(a.date)).map(a => apptCard(a)).join('')
    : `<div class="empty" style="padding:28px"><div class="empty-ico">💰</div><div class="empty-txt">אין תורים שהושלמו<br>בחודש זה</div></div>`;
}

function shiftMonth(d) {
  incMonth = new Date(incMonth.getFullYear(), incMonth.getMonth() + d, 1);
  renderIncome();
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
let toastTimer;
function toast(msg) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ══════════════════════════════════════════════════
   CONTACT PICKER API
══════════════════════════════════════════════════ */
const contactsSupported = ('contacts' in navigator && 'ContactsManager' in window);

async function pickContact() {
  if (!contactsSupported) {
    toast('פיצ\'ר זה עובד ב-Android Chrome בלבד 📱');
    return;
  }
  try {
    const props   = ['name', 'tel'];
    const opts    = { multiple: false };
    const results = await navigator.contacts.select(props, opts);
    if (!results || results.length === 0) return;

    const contact = results[0];

    // Fill name — prefer full name
    if (contact.name && contact.name.length > 0) {
      const nameField = document.getElementById('i-name');
      if (!nameField.value) nameField.value = contact.name[0];
    }

    // Fill phone — take first number, clean it
    if (contact.tel && contact.tel.length > 0) {
      const raw     = contact.tel[0];
      const cleaned = raw.replace(/\s|-/g, '');           // strip spaces/dashes
      const local   = cleaned.replace(/^\+972/, '0');      // +972XX → 0XX
      document.getElementById('i-phone').value = local;
    }

    toast('פרטי הקשר הועתקו ✓');
  } catch (err) {
    if (err.name !== 'AbortError') toast('לא הצלחנו לגשת לאנשי הקשר');
  }
}

   INIT

go('home');
